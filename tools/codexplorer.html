<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeXplorer</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#1e1e2e;--sidebar:#181825;--fg:#cdd6f4;--accent:#89b4fa;--line:#313244;--hover:#313244;--active:#45475a;--tree-indent:18px;--font:ui-monospace,'SF Mono','Cascadia Code',monospace;--header-h:40px}
  body{background:var(--bg);color:var(--fg);font:14px/1.5 var(--font);display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{height:var(--header-h);display:flex;align-items:center;padding:0 14px;background:var(--sidebar);border-bottom:1px solid var(--line);gap:10px;flex-shrink:0}
  header h1{font-size:14px;font-weight:600;color:var(--accent)}
  header span{color:#6c7086;font-size:12px}
  #search-root{flex:1;max-width:300px;background:var(--bg);border:1px solid var(--line);color:var(--fg);padding:4px 10px;border-radius:6px;font:12px var(--font);outline:none}
  #search-root:focus{border-color:var(--accent)}
  .layout{display:flex;flex:1;overflow:hidden}
  #sidebar{width:280px;min-width:180px;background:var(--sidebar);overflow-y:auto;border-right:1px solid var(--line);padding:4px 0;flex-shrink:0;resize:horizontal}
  #sidebar::-webkit-resizer{background:var(--line)}
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #tabs{display:flex;background:var(--sidebar);border-bottom:1px solid var(--line);min-height:32px;overflow-x:auto;flex-shrink:0}
  #tabs::-webkit-scrollbar{height:3px}
  #tabs::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
  .tab{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;cursor:pointer;border-right:1px solid var(--line);white-space:nowrap;color:#6c7086;user-select:none}
  .tab.active{background:var(--bg);color:var(--fg);border-bottom:2px solid var(--accent)}
  .tab .close{font-size:14px;color:#6c7086;border-radius:3px;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
  .tab .close:hover{background:var(--hover);color:var(--fg)}
  #editor{flex:1;overflow:auto;padding:0;background:var(--bg)}
  #editor-content{padding:16px 20px;min-height:100%;white-space:pre-wrap;tab-size:2;font:13px/1.6 var(--font)}
  #empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#6c7086;gap:12px}
  #empty-state svg{opacity:.3;width:64px;height:64px}
  #empty-state p{font-size:13px}
  .tree-item{display:flex;align-items:center;gap:4px;padding:3px 8px;cursor:pointer;font-size:13px;white-space:nowrap;user-select:none;border-radius:2px;margin:1px 6px}
  .tree-item:hover{background:var(--hover)}
  .tree-item.selected{background:var(--active)}
  .tree-item .icon{width:16px;text-align:center;flex-shrink:0;color:#6c7086;font-size:12px}
  .tree-item .chevron{width:16px;text-align:center;flex-shrink:0;color:#6c7086;transition:transform .15s;font-size:10px}
  .tree-item .chevron.open{transform:rotate(90deg)}
  .tree-children{padding-left:var(--tree-indent);display:none}
  .tree-children.open{display:block}
  .file-dir>.icon{color:#fab387}
  .file-js>.icon{color:#f9e2af}
  .file-py>.icon{color:#89b4fa}
  .file-html>.icon{color:#f38ba8}
  .file-css>.icon{color:#a6e3a1}
  .file-json>.icon{color:#f5c2e7}
  .file-md>.icon{color:#74c7ec}
  .file-ts>.icon{color:#89dceb}
  .file-yml>.icon,.file-yaml>.icon{color:#f38ba8}
  .file-toml>.icon{color:#f5c2e7}
  .badge{font-size:10px;background:var(--line);color:#6c7086;padding:1px 6px;border-radius:8px;margin-left:6px}
  .resize-handle{width:4px;cursor:col-resize;background:transparent;flex-shrink:0;position:relative;z-index:10}
  .resize-handle:hover,.resize-handle:active{background:var(--accent)}
  .tab-bar{display:flex;align-items:center;gap:4px;margin-left:auto;padding:0 8px}
  .tab-bar button{background:none;border:none;color:#6c7086;cursor:pointer;padding:4px 6px;border-radius:4px;font-size:12px}
  .tab-bar button:hover{background:var(--hover);color:var(--fg)}
  #statusbar{height:24px;background:var(--sidebar);border-top:1px solid var(--line);display:flex;align-items:center;padding:0 12px;font-size:11px;color:#6c7086;gap:16px;flex-shrink:0}
  #statusbar .path{color:var(--accent)}
  #statusbar .lang{color:#a6e3a1}
  #statusbar .encoding{color:#f9e2af}

  /* Syntax highlighting */
  .hljs-keyword{color:#cba6f7}
  .hljs-string{color:#a6e3a1}
  .hljs-number{color:#fab387}
  .hljs-comment{color:#6c7086;font-style:italic}
  .hljs-function{color:#89b4fa}
  .hljs-title{color:#89b4fa}
  .hljs-params{color:#f2cdcd}
  .hljs-type{color:#f9e2af}
  .hljs-built_in{color:#f38ba8}
  .hljs-literal{color:#fab387}
  .hljs-attr{color:#89dceb}
  .hljs-tag{color:#f38ba8}
  .hljs-name{color:#f38ba8}
  .hljs-attribute{color:#f9e2af}
  .hljs-selector-class{color:#a6e3a1}
  .hljs-selector-id{color:#89b4fa}
  .hljs-meta{color:#f5c2e7}
  .hljs-variable{color:#f2cdcd}
  .hljs-property{color:#89dceb}
  .hljs-operator{color:#89dceb}
  .hljs-punctuation{color:#6c7086}
  .hljs-deletion{background:#f38ba830}
  .hljs-addition{background:#a6e3a130}
</style>
</head>
<body>

<header>
  <h1>&#x2386; CodeXplorer</h1>
  <span>mini</span>
  <input id="search-root" placeholder="Chercher dossier..." value="">
  <div class="tab-bar">
    <button onclick="collapseAll()" title="Tout replier">&#x2501;</button>
    <button onclick="refreshTree()" title="Rafraîchir">&#x21bb;</button>
  </div>
</header>

<div class="layout">
  <div id="sidebar">
    <div id="tree"></div>
  </div>
  <div class="resize-handle" id="resize-handle"></div>
  <div id="main">
    <div id="tabs"></div>
    <div id="editor">
      <div id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <p>Sélectionne un fichier dans l'arborescence</p>
      </div>
      <pre id="editor-content" style="display:none"></pre>
    </div>
  </div>
</div>

<div id="statusbar">
  <span class="path" id="status-path">&nbsp;</span>
  <span class="lang" id="status-lang">&nbsp;</span>
  <span class="encoding" id="status-encoding">UTF-8</span>
  <span id="status-size" style="margin-left:auto">&nbsp;</span>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────
let openTabs = [];
let activeTab = null;
let currentPath = '';
let fileTree = {};
let expandedDirs = new Set();

// ─── API ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {method, headers:{Accept:'application/json'}};
  if (body) {opts.body=JSON.stringify(body); opts.headers['Content-Type']='application/json';}
  const r = await fetch('/api' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ─── File API helpers ────────────────────────────────────────────────
async function listDir(dirPath) {
  return api('POST', '/files/list', {path: dirPath || '.'});
}
async function readFile(filePath) {
  return api('POST', '/files/read', {path: filePath});
}

// ─── Tree ────────────────────────────────────────────────────────────
async function buildTree(dirPath) {
  const tree = {};
  try {
    const items = await listDir(dirPath);
    for (const item of items) {
      const name = item.name || item.path;
      tree[name] = { ...item, children: item.is_dir ? {} : null };
    }
  } catch (e) {
    console.warn('listDir error:', e);
  }
  return tree;
}

async function loadSubtree(node, parentPath) {
  if (!node.children || Object.keys(node.children).length > 0) return;
  const fullPath = parentPath ? parentPath + '/' + node.name : node.name;
  try {
    const items = await listDir(fullPath);
    for (const item of items) {
      const name = item.name || item.path;
      node.children[name] = { ...item, children: item.is_dir ? {} : null };
    }
  } catch (e) {}
}

async function refreshRoot() {
  const root = document.getElementById('search-root').value.trim() || '.';
  fileTree = {};
  const items = await listDir(root);
  for (const item of items) {
    const name = item.name || item.path;
    fileTree[name] = { ...item, children: item.is_dir ? {} : null };
  }
  expandedDirs.clear();
  renderTree();
}

async function refreshTree() {
  const root = document.getElementById('search-root').value.trim() || '.';
  fileTree = {};
  try {
    const items = await listDir(root);
    for (const item of items) {
      const name = item.name || item.path;
      fileTree[name] = { ...item, children: item.is_dir ? {} : null };
    }
  } catch (e) {}
  renderTree();
}

function renderTree() {
  const container = document.getElementById('tree');
  container.innerHTML = '';
  renderTreeNodes(fileTree, '', container);
}

function renderTreeNodes(nodes, basePath, parentEl) {
  const sorted = Object.entries(nodes).sort((a, b) => {
    const aDir = a[1].is_dir;
    const bDir = b[1].is_dir;
    if (aDir !== bDir) return aDir ? -1 : 1;
    return a[0].localeCompare(b[0]);
  });
  for (const [name, node] of sorted) {
    const fullPath = basePath ? basePath + '/' + name : name;
    const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
    const isDir = node.is_dir;
    const el = document.createElement('div');

    const row = document.createElement('div');
    row.className = `tree-item${isDir ? ' file-dir' : ' file-' + ext}`;
    row.dataset.path = fullPath;
    row.dataset.isDir = isDir;

    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '\u25b6';
    if (isDir) { row.appendChild(chevron); }
    else { const sp=document.createElement('span'); sp.style.width='16px'; row.appendChild(sp); }

    const icon = document.createElement('span');
    icon.className = 'icon';
    const icons = {
      dir:'\U0001f4c1', js:'\U0001f7e6', py:'\U0001f7e8', html:'\U0001f7e5', css:'\U0001f7e9',
      json:'\U0001f7ea', md:'\U0001f7eb', ts:'\U0001f7ec', yml:'\U0001f7e5', yaml:'\U0001f7e5',
      toml:'\U0001f7ea', txt:'\U0001f4c4', default:'\U0001f4c4'
    };
    icon.textContent = isDir ? '\U0001f4c1' : (icons[ext] || icons.default);
    row.appendChild(icon);

    const label = document.createElement('span');
    label.textContent = name;
    row.appendChild(label);

    if (isDir && node.children && Object.keys(node.children).length === 0) {
      // try to load lazily on first open
    }

    row.onclick = async (e) => {
      e.stopPropagation();
      if (isDir) {
        const childContainer = el.querySelector('.tree-children');
        const isOpen = childContainer && childContainer.classList.contains('open');
        if (isOpen) {
          childContainer.classList.remove('open');
          chevron.classList.remove('open');
          expandedDirs.delete(fullPath);
        } else {
          if (!childContainer) {
            const cc = document.createElement('div');
            cc.className = 'tree-children';
            el.appendChild(cc);
            await loadSubtree(node, basePath);
            renderTreeNodes(node.children, fullPath, cc);
          }
          const cc = el.querySelector('.tree-children');
          if (cc) {
            cc.classList.add('open');
            chevron.classList.add('open');
            expandedDirs.add(fullPath);
          }
        }
      } else {
        document.querySelectorAll('.tree-item.selected').forEach(s => s.classList.remove('selected'));
        row.classList.add('selected');
        openFile(fullPath);
      }
    };

    el.appendChild(row);
    if (isDir) {
      const children = document.createElement('div');
      children.className = 'tree-children';
      if (expandedDirs.has(fullPath)) { children.classList.add('open'); chevron.classList.add('open'); }
      el.appendChild(children);
      if (expandedDirs.has(fullPath) || children.classList.contains('open')) {
        loadSubtree(node, basePath).then(() => { children.innerHTML=''; renderTreeNodes(node.children, fullPath, children); });
      }
    }
    parentEl.appendChild(el);
  }
}

function collapseAll() {
  expandedDirs.clear();
  document.querySelectorAll('.tree-children').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(c => c.classList.remove('open'));
}

// ─── Tabs ────────────────────────────────────────────────────────────
function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';
  for (const tab of openTabs) {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.path === activeTab ? ' active' : '');
    const name = tab.path.split('/').pop() || tab.path;
    el.textContent = name;

    const close = document.createElement('span');
    close.className = 'close';
    close.textContent = '\u00d7';
    close.onclick = (e) => { e.stopPropagation(); closeTab(tab.path); };
    el.appendChild(close);

    el.onclick = () => activateTab(tab.path);
    container.appendChild(el);
  }
}

function activateTab(path) {
  activeTab = path;
  renderTabs();
  const tab = openTabs.find(t => t.path === path);
  if (tab) displayContent(tab.content, path);
}

function closeTab(path) {
  openTabs = openTabs.filter(t => t.path !== path);
  if (activeTab === path) {
    activeTab = openTabs.length > 0 ? openTabs[openTabs.length-1].path : null;
  }
  renderTabs();
  if (activeTab) {
    const tab = openTabs.find(t => t.path === activeTab);
    if (tab) displayContent(tab.content, activeTab);
  } else {
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('editor-content').style.display = 'none';
    document.getElementById('status-path').textContent = '';
    document.getElementById('status-lang').textContent = '';
    document.getElementById('status-size').textContent = '';
  }
}

// ─── Open & Display ──────────────────────────────────────────────────
async function openFile(path) {
  currentPath = path;
  try {
    const data = await readFile(path);
    const content = data.content || data.text || '';
    const existing = openTabs.find(t => t.path === path);
    if (existing) {
      existing.content = content;
    } else {
      openTabs.push({path, content});
    }
    activeTab = path;
    renderTabs();
    displayContent(content, path);
  } catch (e) {
    alert('Erreur lecture: ' + e.message);
  }
}

function displayContent(content, path) {
  document.getElementById('empty-state').style.display = 'none';
  const el = document.getElementById('editor-content');
  el.style.display = 'block';

  const ext = path.includes('.') ? path.split('.').pop().toLowerCase() : '';
  const langMap = {js:'javascript',py:'python',ts:'typescript',html:'html',css:'css',json:'json',md:'markdown',yml:'yaml',yaml:'yaml',toml:'toml',txt:'text',sh:'bash',bash:'bash',zsh:'bash',sql:'sql',c:'c',cpp:'cpp',h:'c',hpp:'cpp',java:'java',rs:'rust',go:'go',rb:'ruby',php:'php',vue:'html',jsx:'javascript',tsx:'typescript',svelte:'html'};
  const lang = langMap[ext] || 'plaintext';

  const highlighted = highlightCode(content, lang);
  el.innerHTML = highlighted;

  // Status bar
  document.getElementById('status-path').textContent = path;
  document.getElementById('status-lang').textContent = lang;
  const lines = content.split('\n').length;
  const bytes = new TextEncoder().encode(content).length;
  document.getElementById('status-size').textContent = `${lines} lines, ${formatBytes(bytes)}`;
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

// ─── Simple syntax highlighter ───────────────────────────────────────
function highlightCode(code, lang) {
  const htmlEscaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const patterns = {
    comment: /(\/\/.*$|\/\*[\s\S]*?\*\/|#.*$|--.*$)/gm,
    string: /("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g,
    number: /\b(\d+\.?\d*|0x[0-9a-fA-F]+)\b/g,
    keyword: /\b(async|await|break|case|catch|class|const|continue|debugger|default|delete|do|else|export|extends|finally|for|function|if|import|in|instanceof|let|new|of|return|static|super|switch|this|throw|try|typeof|var|void|while|with|yield|def|if|elif|else|for|while|import|from|class|return|try|except|finally|raise|with|pass|None|True|False|lambda|and|or|not|is|in|as|assert|del|global|nonlocal|print|def|end|do|module|where|select|from|fn|let|mut|pub|impl|struct|enum|match|use|mod|trait|type)\b/g,
    builtin: /\b(console|Math|JSON|Array|Object|String|Number|Boolean|Date|RegExp|Map|Set|Promise|fetch|setTimeout|setInterval|document|window|process|require|module|exports|__dirname|__filename|Buffer|parseInt|parseFloat|isNaN|isFinite|undefined|null|print|len|range|int|str|float|list|dict|tuple|set|super|self|cls)\b/g,
    function: /\b([a-zA-Z_$][\w$]*)\s*\(/g,
    tag: /&lt;(\/?)(\w[\w-]*)([^&]*?)&gt;/g,
    attr: /(\w[\w-]*)\s*=/g,
  };

  let result = htmlEscaped;

  // Tag names (HTML/JSX)
  result = result.replace(/&lt;(\/?)(\w[\w-]*)/g, (m, slash, tag) => {
    return `&lt;${slash}<span class="hljs-name">${tag}</span>`;
  });

  // Attributes
  result = result.replace(/(\w[\w-]*)(\s*=\s*["'])/g, (m, attr, eq) => {
    return `<span class="hljs-attribute">${attr}</span>${eq}`;
  });

  // Keywords
  result = result.replace(patterns.keyword, '<span class="hljs-keyword">$1</span>');

  // Built-ins
  result = result.replace(patterns.builtin, '<span class="hljs-built_in">$1</span>');

  // Strings
  result = result.replace(patterns.string, '<span class="hljs-string">$1</span>');

  // Numbers
  result = result.replace(patterns.number, '<span class="hljs-number">$1</span>');

  // Comments (after strings to avoid overlap)
  result = result.replace(patterns.comment, '<span class="hljs-comment">$1</span>');

  // Function calls
  result = result.replace(/\b([a-zA-Z_$][\w$]*)\s*\(/g, (m, name) => {
    if (['if','for','while','switch','catch','function','async','await','return','import','export','class','typeof','instanceof','throw','delete','void','with','yield','def','elif','except','raise','lambda','print','not','and','or','is','in','as','del','global','nonlocal','select','from','where','match','use','mod','trait','impl','enum','struct','fn','let','mut','pub','while','for','loop','if','else','elseif'].includes(name)) return m;
    return `<span class="hljs-function"><span class="hljs-title">${name}</span></span>(`;
  });

  return result;
}

// ─── Resize ──────────────────────────────────────────────────────────
const handle = document.getElementById('resize-handle');
let isResizing = false;
handle.addEventListener('mousedown', (e) => {
  isResizing = true; e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const sidebar = document.getElementById('sidebar');
  let w = e.clientX - sidebar.getBoundingClientRect().left;
  w = Math.max(150, Math.min(600, w));
  sidebar.style.width = w + 'px';
});
document.addEventListener('mouseup', () => { isResizing = false; });

// ─── Search on enter ─────────────────────────────────────────────────
document.getElementById('search-root').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') refreshRoot();
});

// ─── Init ────────────────────────────────────────────────────────────
refreshTree();
</script>
</body>
</html>
